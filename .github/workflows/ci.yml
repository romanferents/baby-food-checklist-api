name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore BabyFoodChecklist.sln

      - name: Build
        run: dotnet build BabyFoodChecklist.sln --no-restore -c Release

      - name: Run unit tests
        run: >
          dotnet test tests/BabyFoodChecklist.Tests.Unit
          --no-build
          -c Release
          --logger trx
          --results-directory TestResults

      - name: Run integration tests
        run: >
          dotnet test tests/BabyFoodChecklist.Tests.Integration
          --no-build
          -c Release
          --logger trx
          --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore BabyFoodChecklist.sln

      - name: Check formatting
        run: dotnet format BabyFoodChecklist.sln --verify-no-changes --no-restore
